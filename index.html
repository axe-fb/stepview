<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="StepView — step, distance, and calorie counter for Meta Ray-Ban Display glasses.">
  <meta name="mrbd-web-app-capable" content="yes">
  <title>StepView</title>
  <link rel="stylesheet" href="styles.css?v=9">
</head>
<body>
  <div id="app">
    <!-- MAIN SCREEN -->
    <div id="home" class="screen">
      <!-- FULL VIEW -->
      <div class="full-view">
        <div id="perm-banner" class="perm-banner hidden">
          <span class="perm-text" id="perm-text">Motion &amp; Location access needed</span>
          <button class="perm-btn focusable" data-action="request-perms" tabindex="0">Grant</button>
        </div>
        <div class="content">
          <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 220 220" width="216" height="216" aria-hidden="true">
              <circle class="ring-track" cx="110" cy="110" r="96"></circle>
              <circle class="ring-prog" id="ring-prog" cx="110" cy="110" r="96"></circle>
            </svg>
            <div class="ring-center">
              <div class="ring-steps" id="steps">0</div>
              <div class="ring-label">steps</div>
            </div>
          </div>
        </div>

        <div class="cards">
          <div class="stat">
            <div class="stat-label">Distance</div>
            <div class="stat-value"><span id="distance">0.00</span> <span class="unit">km</span></div>
          </div>
          <div class="stat">
            <div class="stat-label">Calories</div>
            <div class="stat-value"><span id="calories">0</span> <span class="unit">kcal</span></div>
          </div>
        </div>

        <nav class="actions">
          <div class="row controls">
            <button id="toggle" class="btn primary focusable" data-action="toggle" aria-label="Start" tabindex="0">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="7,5 19,12 7,19" fill="currentColor"></polygon></svg>
            </button>
            <button class="btn ghost icon-btn focusable" data-action="minimize" aria-label="Minimize" tabindex="0">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="6" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></line></svg>
            </button>
            <button class="btn ghost icon-btn focusable" data-action="settings" aria-label="Settings" tabindex="0">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
          </div>
        </nav>
      </div>

      <!-- MINIMIZED VIEW -->
      <div class="min-view hidden">
        <div class="min-count">
          <span class="boot-emoji" aria-hidden="true">🦶</span>
          <div id="steps-min">0</div>
        </div>
        <button class="btn ghost icon-btn focusable" data-action="maximize" aria-label="Maximize" tabindex="0">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>
      </div>
    </div>

    <!-- SETTINGS / GOAL SCREEN -->
    <div id="settings" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back" tabindex="0">&#8592;</button>
        <h1>Settings</h1>
      </header>
      <div class="perm-banner hidden">
        <span class="perm-text">Motion &amp; Location access needed</span>
        <button class="perm-btn focusable" data-action="request-perms" tabindex="0">Grant</button>
      </div>
      <nav class="actions">
        <div class="row">
          <button class="btn danger focusable" data-action="reset" tabindex="0">Reset</button>
          <button class="btn primary focusable" data-action="back" tabindex="0">Done</button>
        </div>
        <div class="row">
          <button class="btn ghost wide focusable" data-action="debug" tabindex="0">Debug</button>
        </div>
      </nav>
      <div class="content settings-content">
        <div class="set-row">
          <div class="set-info"><div class="set-label">Step Goal</div><div class="set-val" id="set-goal">8,000</div></div>
          <div class="set-ctrl">
            <button class="step-btn focusable" data-action="goal-dec" tabindex="0">&#8722;</button>
            <button class="step-btn focusable" data-action="goal-inc" tabindex="0">+</button>
          </div>
        </div>
        <div class="set-row">
          <div class="set-info"><div class="set-label">Weight</div><div class="set-val"><span id="set-weight">70</span> kg</div></div>
          <div class="set-ctrl">
            <button class="step-btn focusable" data-action="weight-dec" tabindex="0">&#8722;</button>
            <button class="step-btn focusable" data-action="weight-inc" tabindex="0">+</button>
          </div>
        </div>
        <div class="set-row">
          <div class="set-info"><div class="set-label">Height</div><div class="set-val"><span id="set-height">170</span> cm</div></div>
          <div class="set-ctrl">
            <button class="step-btn focusable" data-action="height-dec" tabindex="0">&#8722;</button>
            <button class="step-btn focusable" data-action="height-inc" tabindex="0">+</button>
          </div>
        </div>
        <div class="set-note" id="set-note">Stride ~0.71 m &middot; GPS outdoors, steps indoors</div>
      </div>
    </div>

    <!-- DEBUG SCREEN -->
    <div id="debug" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="debug-close" tabindex="0">&#8592;</button>
        <h1>Debug</h1>
      </header>
      <div class="content debug-content">
        <div id="dbg-readout" class="dbg-readout">collecting…</div>
      </div>
      <nav class="actions">
        <div class="row">
          <button class="btn ghost focusable" data-action="dbg-reset" tabindex="0">Reset Counters</button>
          <button class="btn primary focusable" data-action="debug-close" tabindex="0">Done</button>
        </div>
      </nav>
    </div>
  </div>
  <script src="app.js?v=9"></script>
</body>
</html>
